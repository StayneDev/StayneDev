  <!-- code -->
  <text x="56" y="30"  class="code"><tspan class="kw">const</tspan><tspan class="pun"> </tspan><tspan class="id">StayneDev</tspan><tspan class="pun"> = {</tspan></text>
  <text x="56" y="46"  class="code"><tspan class="pun">  </tspan><tspan class="key">name</tspan><tspan class="pun">:        </tspan><tspan class="str">"Stayne"</tspan><tspan class="pun">,</tspan></text>
  <text x="56" y="62"  class="code"><tspan class="pun">  </tspan><tspan class="key">location</tspan><tspan class="pun">:    </tspan><tspan class="str">"Brazil"</tspan><tspan class="pun">,</tspan></text>
  <text x="56" y="78"  class="code"> </text>
  <text x="56" y="94"  class="code"><tspan class="pun">  </tspan><tspan class="key">currentWork</tspan><tspan class="pun">: [</tspan></text>
  <text x="56" y="110" class="code"><tspan class="pun">    </tspan><tspan class="str">"Building full-stack systems @ SynergyEcosys"</tspan><tspan class="pun">,</tspan></text>
  <text x="56" y="126" class="code"><tspan class="pun">    </tspan><tspan class="str">"Developing Vermolin.UX — inventory &amp; sales platform"</tspan><tspan class="pun">,</tspan></text>
