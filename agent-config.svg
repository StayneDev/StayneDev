<svg xmlns="http://www.w3.org/2000/svg" width="800" height="420" viewBox="0 0 800 420">
  <rect width="800" height="420" rx="8" fill="#0d0d0d" stroke="#1a1a1a" stroke-width="1"/>

  <!-- line numbers bar -->
  <rect x="0" y="0" width="40" height="420" rx="8" fill="#111111"/>

  <style>
    .code { font-family: 'Share Tech Mono', 'Courier New', monospace; font-size: 13px; }
    .ln   { fill: #2a2a2a; font-family: 'Courier New', monospace; font-size: 12px; }
    .kw   { fill: #abd200; } /* keyword: const, function */
    .id   { fill: #68b587; } /* identifier */
    .str  { fill: #7ec8a4; } /* string */
    .key  { fill: #abd200; } /* object key */
    .pun  { fill: #00ff41; } /* punctuation */
    .cmt  { fill: #2d5a38; } /* comment */
    .arr  { fill: #7ec8a4; } /* array values */
    .num  { fill: #abd200; }
  </style>

  <!-- line numbers -->
  <text x="26" y="30"  class="ln" text-anchor="middle">1</text>
  <text x="26" y="46"  class="ln" text-anchor="middle">2</text>
  <text x="26" y="62"  class="ln" text-anchor="middle">3</text>
