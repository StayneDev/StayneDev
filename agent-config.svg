  <text x="26" y="222" class="ln" text-anchor="middle">13</text>
  <text x="26" y="238" class="ln" text-anchor="middle">14</text>
  <text x="26" y="254" class="ln" text-anchor="middle">15</text>
  <text x="26" y="270" class="ln" text-anchor="middle">16</text>
  <text x="26" y="286" class="ln" text-anchor="middle">17</text>
  <text x="26" y="302" class="ln" text-anchor="middle">18</text>
