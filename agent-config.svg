  <text x="56" y="190" class="code"><tspan class="pun">    </tspan><tspan class="key">languages</tspan><tspan class="pun">:  [</tspan><tspan class="str">"Java"</tspan><tspan class="pun">, </tspan><tspan class="str">"Python"</tspan><tspan class="pun">, </tspan><tspan class="str">".NET"</tspan><tspan class="pun">, </tspan><tspan class="str">"Bash"</tspan><tspan class="pun">],</tspan></text>
  <text x="56" y="206" class="code"><tspan class="pun">    </tspan><tspan class="key">infra</tspan><tspan class="pun">:      [</tspan><tspan class="str">"Linux"</tspan><tspan class="pun">, </tspan><tspan class="str">"Proxmox"</tspan><tspan class="pun">, </tspan><tspan class="str">"Kubernetes"</tspan><tspan class="pun">, </tspan><tspan class="str">"Docker"</tspan><tspan class="pun">],</tspan></text>
  <text x="56" y="222" class="code"><tspan class="pun">    </tspan><tspan class="key">databases</tspan><tspan class="pun">:  [</tspan><tspan class="str">"PostgreSQL"</tspan><tspan class="pun">],</tspan></text>
  <text x="56" y="238" class="code"><tspan class="pun">    </tspan><tspan class="key">tools</tspan><tspan class="pun">:      [</tspan><tspan class="str">"Git"</tspan><tspan class="pun">, </tspan><tspan class="str">"VSCode"</tspan><tspan class="pun">, </tspan><tspan class="str">"n8n"</tspan><tspan class="pun">],</tspan></text>
  <text x="56" y="254" class="code"><tspan class="pun">  },</tspan></text>
  <text x="56" y="270" class="code"> </text>
  <text x="56" y="286" class="code"><tspan class="pun">  </tspan><tspan class="key">contact</tspan><tspan class="pun">: </tspan><tspan class="str">"makalyster.devops@gmail.com"</tspan><tspan class="pun">,</tspan></text>
